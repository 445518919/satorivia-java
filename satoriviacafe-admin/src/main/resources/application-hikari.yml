#file: noinspection SpringBootApplicationYaml
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    hikari:
      master:
        jdbc-url: jdbc:p6spy:mysql://localhost:3306/satoriviacafe-test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowMultiQueries=true
        username: root
        password:
        minimum-idle: 10
        maximum-pool-size: 150
        idle-timeout: 600000
        connection-timeout: 5000
        pool-name: HikariCP-Master
      slave:
        enabled: false
        jdbc-url:
        username:
        password:
        minimum-idle: 5
        maximum-pool-size: 20
        idle-timeout: 600000
        connection-timeout: 5000
        pool-name: HikariCP-Slave
