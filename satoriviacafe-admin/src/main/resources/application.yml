#file: noinspection SpellCheckingInspection
# 项目相关配置
satoriviacafe:
  # 名称
  name: satoriviacafe
  # 版本
  version: 3.8.9
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/satoriviacafe/uploadPath，Linux配置 /home/satoriviacafe/uploadPath）
  profile: D:/satoriviacafe/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: char
  defaultRoleId: 2
server:
  address: 0.0.0.0
  # 服务器的HTTP端口，默认为8080
  port: 17070
  servlet:
    # 应用的访问路径
    context-path: /
# 日志配置
logging:
  level:
    com.satoriviacafe: info
    org.springframework: warn
#    org:
#      springframework:
#        beans: debug
#        context: debug
# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 10
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  threads:
    virtual:
      enabled: true
  quartz:
    properties:
      org.quartz.threadPool.class: com.satoriviacafe.quartz.config.VirtualThreadQuartzThreadPool
      org.quartz.threadPool.threadCount: 1000  # 理论上虚拟线程可以很大，实际按需求设定
  data:
    redis:
      host: 192.168.1.6
      # 端口，默认为6379
      port: 16379
      # 数据库索引1
      # 密码
      password: "lWT06)%t^j-[FzC@yXpk(Ubn:nz3djSm'T)h?GFKequ$pE(tiV:FpGG[{sM>CSQ^"
      # 连接超时时间
      timeout: 10s
      database: 0
      # 连接池配置
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages,i18n-member/messages
  profiles:
    active: hikari
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mail:
    host: mail.deebug.tw
    port: 2465
    username: satoriviacafe@satoriviacafe.app
    protocol: smtps
    password: ""
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtps
        sender: "Satoriviacafe Security <{username}>"
        from: "Satoriviacafe Security <{username}>"
# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: 4xV9APSi2tvUjGDBLoLlLsnmiunbcwOH,omxzGCYZenhkTxVZ,TPCUWErfeCT4pjmfOfLgP4kOE5W95Meu,shSaN33bSJfAK6c7Jh5tShaE6tNRMfHC,
  # 令牌有效期（默认30分钟）
  expireTime: 43200

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.satoriviacafe.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: false
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
